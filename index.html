<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tik Tak Toe</title>
    <script type="module">
        // Firebase SDK import
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getDatabase, ref, set, onValue, update, remove, onDisconnect, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import firebaseConfig from './firebase-config.js';

        // Initialize Firebase
        let app = null;
        let db = null;
        let auth = null;
        let currentUser = null;
        let authReady = false;

        async function initFirebase() {
            try {
                app = initializeApp(firebaseConfig);
                db = getDatabase(app);
                auth = getAuth(app);
                
                // Anonymous authentication for secure access
                const userCredential = await signInAnonymously(auth);
                currentUser = userCredential.user;
                authReady = true;
                console.log('Firebase authenticated - UID:', currentUser.uid);
                
                // Also listen for auth state changes
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        currentUser = user;
                        console.log('Auth state changed - UID:', user.uid);
                    } else {
                        currentUser = null;
                    }
                });
                
                console.log('Firebase initialized successfully');
            } catch (e) {
                console.error('Firebase initialization failed:', e);
            }
        }

        // Make Firebase available globally for the game class
        window.firebaseDB = () => db;
        window.firebaseAuth = () => auth;
        window.firebaseCurrentUser = () => currentUser;
        window.firebaseAuthReady = () => authReady;
        window.firebaseRef = ref;
        window.firebaseSet = set;
        window.firebaseOnValue = onValue;
        window.firebaseUpdate = update;
        window.firebaseRemove = remove;
        window.firebaseOnDisconnect = onDisconnect;
        window.firebaseServerTimestamp = serverTimestamp;

        initFirebase();
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 20px;
            font-size: 1.1em;
        }

        .mode-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .mode-btn {
            padding: 10px 20px;
            font-size: 0.9em;
            font-weight: bold;
            border: 2px solid #667eea;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
            color: #667eea;
        }

        .mode-btn:hover {
            background: #f0f0f0;
        }

        .mode-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        .online-menu {
            display: none;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
        }

        .online-menu.visible {
            display: flex;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            text-align: left;
        }

        .input-group label {
            font-size: 0.9em;
            color: #666;
            font-weight: bold;
        }

        .input-group input {
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1em;
            transition: border-color 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .online-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-secondary {
            padding: 12px 25px;
            font-size: 0.95em;
            font-weight: bold;
            border: 2px solid #28a745;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
            color: #28a745;
        }

        .btn-secondary:hover {
            background: #28a745;
            color: white;
        }

        .game-code-container {
            display: none;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .game-code-container.visible {
            display: flex;
        }

        .game-code-display {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 15px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: bold;
        }

        .copy-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: white;
        }

        .copy-btn.copied {
            background: #4caf50;
            border-color: #4caf50;
        }

        .players-info {
            display: none;
            gap: 20px;
            justify-content: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .players-info.visible {
            display: flex;
        }

        .player-info {
            padding: 10px 20px;
            background: #f0f0f0;
            border-radius: 10px;
            font-weight: bold;
        }

        .player-info.you {
            background: #e3f2fd;
            color: #1976d2;
        }

        .player-info.opponent {
            background: #fce4ec;
            color: #c2185b;
        }

        .connection-status {
            display: none;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .connection-status.visible {
            display: inline-block;
        }

        .connection-status.connected {
            background: #e8f5e9;
            color: #388e3c;
        }

        .connection-status.waiting {
            background: #fff3e0;
            color: #f57c00;
        }

        .connection-status.disconnected {
            background: #ffebee;
            color: #c62828;
        }

        .status {
            font-size: 1.3em;
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 10px;
            background: #f0f0f0;
            color: #333;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .status.player-x {
            background: #e3f2fd;
            color: #1976d2;
        }

        .status.player-o {
            background: #fce4ec;
            color: #c2185b;
        }

        .status.winner {
            background: #e8f5e9;
            color: #388e3c;
            animation: pulse 1s ease-in-out infinite;
        }

        .status.draw {
            background: #fff3e0;
            color: #f57c00;
        }

        .status.ai-thinking {
            background: #f3e5f5;
            color: #7b1fa2;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 30px;
            max-width: 350px;
            margin-left: auto;
            margin-right: auto;
        }

        .cell {
            aspect-ratio: 1;
            background: linear-gradient(145deg, #f5f5f5, #e0e0e0);
            border: none;
            border-radius: 15px;
            font-size: 3em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 5px 5px 10px #d1d1d1, -5px -5px 10px #ffffff;
            color: #333;
        }

        .cell:hover:not(.taken) {
            transform: translateY(-3px);
            box-shadow: 8px 8px 15px #d1d1d1, -8px -8px 15px #ffffff;
        }

        .cell:active:not(.taken) {
            transform: translateY(0);
            box-shadow: 3px 3px 8px #d1d1d1, -3px -3px 8px #ffffff;
        }

        .cell.taken {
            cursor: not-allowed;
        }

        .cell.x {
            color: #1976d2;
            text-shadow: 2px 2px 4px rgba(25, 118, 210, 0.3);
        }

        .cell.o {
            color: #c2185b;
            text-shadow: 2px 2px 4px rgba(194, 24, 89, 0.3);
        }

        .cell.winning {
            background: linear-gradient(145deg, #c8e6c9, #a5d6a7);
            animation: winner-pulse 0.5s ease-in-out infinite alternate;
        }

        @keyframes winner-pulse {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        .score-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
        }

        .score {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-width: 0;
        }

        .score-label {
            font-size: 0.85em;
            color: #666;
            margin-bottom: 8px;
            line-height: 1.3;
            word-wrap: break-word;
            overflow-wrap: break-word;
            hyphens: auto;
        }

        .score-value {
            font-size: 2em;
            font-weight: bold;
        }

        .score-x { color: #1976d2; }
        .score-o { color: #c2185b; }
        .score-draw { color: #f57c00; }

        .btn {
            padding: 15px 40px;
            font-size: 1.1em;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .footer {
            margin-top: 30px;
            color: #999;
            font-size: 0.9em;
        }

        .version {
            margin-top: 10px;
            color: #bbb;
            font-size: 0.7em;
        }

        @media (max-width: 480px) {
            .game-container {
                padding: 20px;
            }

            h1 {
                font-size: 1.8em;
                letter-spacing: 2px;
            }

            .subtitle {
                font-size: 0.95em;
            }

            .cell {
                font-size: 2.2em;
            }

            .game-board {
                max-width: 100%;
                gap: 8px;
            }

            .mode-selector {
                gap: 8px;
            }

            .mode-btn, .difficulty-btn {
                font-size: 0.75em;
                padding: 8px 12px;
            }

            .score-board {
                padding: 15px 10px;
                gap: 10px;
            }

            .score-label {
                font-size: 0.75em;
                line-height: 1.2;
            }

            .score-value {
                font-size: 1.6em;
            }

            .status {
                font-size: 1.1em;
                padding: 12px;
            }

            .btn {
                padding: 12px 30px;
                font-size: 1em;
            }

            .version {
                font-size: 0.65em;
            }

            .online-menu {
                padding: 15px;
            }

            .input-group input {
                padding: 10px 12px;
                font-size: 0.95em;
            }

            .btn-secondary {
                padding: 10px 20px;
                font-size: 0.9em;
            }

            .player-info {
                padding: 8px 15px;
                font-size: 0.9em;
            }
        }

        @media (max-width: 360px) {
            .game-container {
                padding: 15px;
            }

            h1 {
                font-size: 1.6em;
            }

            .score-label {
                font-size: 0.7em;
            }

            .score-value {
                font-size: 1.4em;
            }

            .mode-btn {
                font-size: 0.7em;
                padding: 6px 10px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎮 Tik Tak Toe</h1>
        <p class="subtitle" id="subtitle">Zwei Spieler - Ein Sieger</p>
        
        <div class="mode-selector">
            <button class="mode-btn active" data-mode="pvp">👥 2 Spieler</button>
            <button class="mode-btn" data-mode="ai-easy">🤖 vs KI (Einfach)</button>
            <button class="mode-btn" data-mode="ai-hard">🤖 vs KI (Brutal)</button>
            <button class="mode-btn" data-mode="online">🌐 Online</button>
        </div>

        <div class="online-menu" id="online-menu">
            <div class="input-group">
                <label for="player-name">Dein Spielername</label>
                <input type="text" id="player-name" placeholder="z.B. MaxMustermann" maxlength="15">
            </div>
            <div class="online-buttons">
                <button class="btn-secondary" id="create-game">🎮 Spiel erstellen</button>
                <button class="btn-secondary" id="join-game">🔗 Spiel beitreten</button>
            </div>
            <div class="input-group" id="join-code-group" style="display: none;">
                <label for="game-code-input">Spiel-Code</label>
                <input type="text" id="game-code-input" placeholder="z.B. ABC123" maxlength="6">
                <button class="btn-secondary" id="confirm-join" style="margin-top: 10px;">Beitreten</button>
            </div>
        </div>

        <div class="game-code-container" id="game-code-container">
            <div class="game-code-display">
                🎮 Dein Spiel-Code: <span id="game-code"></span>
                <button class="copy-btn" id="copy-code-btn" title="Code kopieren">
                    📋 Kopieren
                </button>
            </div>
        </div>

        <div class="players-info" id="players-info">
            <div class="player-info you" id="player-you">Du: -</div>
            <div class="player-info opponent" id="player-opponent">Gegner: Warte...</div>
        </div>

        <div class="connection-status" id="connection-status">Verbindung wird hergestellt...</div>
        
        <div class="score-board" id="score-board">
            <div class="score">
                <div class="score-label">Spieler X</div>
                <div class="score-value score-x" id="score-x">0</div>
            </div>
            <div class="score">
                <div class="score-label">Unentschieden</div>
                <div class="score-value score-draw" id="score-draw">0</div>
            </div>
            <div class="score">
                <div class="score-label" id="score-o-label">Spieler O</div>
                <div class="score-value score-o" id="score-o">0</div>
            </div>
        </div>

        <div class="status player-x" id="status">Spieler X ist dran</div>
        
        <div class="game-board" id="board">
            <button class="cell" data-index="0"></button>
            <button class="cell" data-index="1"></button>
            <button class="cell" data-index="2"></button>
            <button class="cell" data-index="3"></button>
            <button class="cell" data-index="4"></button>
            <button class="cell" data-index="5"></button>
            <button class="cell" data-index="6"></button>
            <button class="cell" data-index="7"></button>
            <button class="cell" data-index="8"></button>
        </div>

        <button class="btn btn-primary" id="restart-btn">Neues Spiel</button>
        
        <div class="footer">
            Viel Spaß beim Spielen! 🦀
            <div class="version">v2.1.3</div>
        </div>
    </div>

    <script>
        class TikTakToe {
            constructor() {
                this.board = Array(9).fill('');
                this.currentPlayer = 'X';
                this.gameActive = true;
                this.scores = { X: 0, O: 0, draw: 0 };
                this.gameMode = 'pvp';
                this.aiPlayer = 'O';
                this.humanPlayer = 'X';
                
                // Online mode variables
                this.isOnlineMode = false;
                this.gameId = null;
                this.playerName = '';
                this.playerSymbol = null;
                this.opponentName = '';
                this.isHost = false;
                this.gameRef = null;
                this.unsubscribe = null;
                
                this.statusElement = document.getElementById('status');
                this.boardElement = document.getElementById('board');
                this.restartButton = document.getElementById('restart-btn');
                this.subtitleElement = document.getElementById('subtitle');
                this.scoreOLabel = document.getElementById('score-o-label');
                this.scoreBoard = document.getElementById('score-board');
                
                this.winningCombinations = [
                    [0, 1, 2], [3, 4, 5], [6, 7, 8],
                    [0, 3, 6], [1, 4, 7], [2, 5, 8],
                    [0, 4, 8], [2, 4, 6]
                ];
                
                this.init();
            }
            
            init() {
                this.cells = this.boardElement.querySelectorAll('.cell');
                this.cells.forEach(cell => {
                    cell.addEventListener('click', (e) => this.handleCellClick(e));
                });
                
                this.restartButton.addEventListener('click', () => this.restartGame());
                
                document.querySelectorAll('.mode-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => this.setGameMode(e.target.dataset.mode));
                });

                // Online mode setup
                this.setupOnlineMode();
            }

            setupOnlineMode() {
                const createBtn = document.getElementById('create-game');
                const joinBtn = document.getElementById('join-game');
                const confirmJoinBtn = document.getElementById('confirm-join');
                const joinCodeGroup = document.getElementById('join-code-group');

                createBtn.addEventListener('click', () => this.createOnlineGame());
                joinBtn.addEventListener('click', () => {
                    joinCodeGroup.style.display = 'flex';
                    joinCodeGroup.style.flexDirection = 'column';
                });
                confirmJoinBtn.addEventListener('click', () => this.joinOnlineGame());
            }

            generateGameCode() {
                return Math.random().toString(36).substring(2, 8).toUpperCase();
            }

            async createOnlineGame() {
                const nameInput = document.getElementById('player-name');
                this.playerName = nameInput.value.trim() || 'Spieler 1';
                
                if (!window.firebaseDB()) {
                    alert('Firebase ist nicht verfügbar. Bitte firebase-config.js erstellen.');
                    return;
                }

                // Wait for authentication with timeout
                let attempts = 0;
                let currentUser = window.firebaseCurrentUser();
                while (!currentUser && attempts < 10) {
                    await new Promise(resolve => setTimeout(resolve, 500));
                    currentUser = window.firebaseCurrentUser();
                    attempts++;
                }
                
                if (!currentUser) {
                    alert('Authentifizierung fehlgeschlagen. Bitte lade die Seite neu und versuche es erneut.');
                    return;
                }

                this.gameId = this.generateGameCode();
                this.isHost = true;
                this.playerSymbol = 'X';
                
                const db = window.firebaseDB();
                this.gameRef = window.firebaseRef(db, `games/${this.gameId}`);
                
                try {
                    await window.firebaseSet(this.gameRef, {
                        board: Array(9).fill(''),
                        currentPlayer: 'X',
                        gameActive: true,
                        host: { 
                            name: this.playerName, 
                            symbol: 'X', 
                            connected: true,
                            uid: currentUser.uid
                        },
                        guest: { name: null, symbol: null, connected: false },
                        status: 'waiting',
                        createdAt: window.firebaseServerTimestamp()
                    });

                    // Setup disconnect handler
                    const disconnectRef = window.firebaseRef(db, `games/${this.gameId}/host/connected`);
                    window.firebaseOnDisconnect(disconnectRef).set(false);

                    this.showGameCode();
                    this.listenToGame();
                    this.updateConnectionStatus('waiting', 'Warte auf Gegner...');
                } catch (error) {
                    console.error('Error creating game:', error);
                    alert('Fehler beim Erstellen des Spiels. Bitte versuche es erneut.');
                }
            }

            async joinOnlineGame() {
                const nameInput = document.getElementById('player-name');
                const codeInput = document.getElementById('game-code-input');
                
                this.playerName = nameInput.value.trim() || 'Spieler 2';
                this.gameId = codeInput.value.trim().toUpperCase();
                
                if (!this.gameId) {
                    alert('Bitte gib einen Spiel-Code ein!');
                    return;
                }

                if (!window.firebaseDB()) {
                    alert('Firebase ist nicht verfügbar.');
                    return;
                }

                // Wait for authentication with timeout
                let attempts = 0;
                let currentUser = window.firebaseCurrentUser();
                while (!currentUser && attempts < 10) {
                    await new Promise(resolve => setTimeout(resolve, 500));
                    currentUser = window.firebaseCurrentUser();
                    attempts++;
                }
                
                if (!currentUser) {
                    alert('Authentifizierung fehlgeschlagen. Bitte lade die Seite neu und versuche es erneut.');
                    return;
                }

                const db = window.firebaseDB();
                this.gameRef = window.firebaseRef(db, `games/${this.gameId}`);
                
                // Check if game exists
                const snapshot = await new Promise(resolve => {
                    window.firebaseOnValue(this.gameRef, resolve, { onlyOnce: true });
                });
                
                const gameData = snapshot.val();
                if (!gameData) {
                    alert('Spiel nicht gefunden!');
                    return;
                }
                
                if (gameData.status !== 'waiting') {
                    alert('Spiel ist bereits voll!');
                    return;
                }

                // Prevent joining your own game
                if (gameData.host?.uid === currentUser.uid) {
                    alert('Du kannst deinem eigenen Spiel nicht beitreten!');
                    return;
                }

                this.isHost = false;
                this.playerSymbol = 'O';
                
                await window.firebaseUpdate(this.gameRef, {
                    'guest': { 
                        name: this.playerName, 
                        symbol: 'O', 
                        connected: true,
                        uid: currentUser.uid
                    },
                    'status': 'playing'
                });

                // Setup disconnect handler
                const disconnectRef = window.firebaseRef(db, `games/${this.gameId}/guest/connected`);
                window.firebaseOnDisconnect(disconnectRef).set(false);

                document.getElementById('join-code-group').style.display = 'none';
                this.listenToGame();
            }

            showGameCode() {
                document.getElementById('game-code').textContent = this.gameId;
                document.getElementById('game-code-container').classList.add('visible');
                document.getElementById('online-menu').classList.remove('visible');
                
                // Setup copy button
                const copyBtn = document.getElementById('copy-code-btn');
                copyBtn.onclick = () => this.copyGameCode();
            }

            async copyGameCode() {
                try {
                    await navigator.clipboard.writeText(this.gameId);
                    const copyBtn = document.getElementById('copy-code-btn');
                    const originalText = copyBtn.textContent;
                    copyBtn.textContent = '✅ Kopiert!';
                    copyBtn.classList.add('copied');
                    
                    setTimeout(() => {
                        copyBtn.textContent = originalText;
                        copyBtn.classList.remove('copied');
                    }, 2000);
                } catch (err) {
                    console.error('Failed to copy:', err);
                    alert('Code: ' + this.gameId);
                }
            }

            listenToGame() {
                if (this.unsubscribe) this.unsubscribe();
                
                this.unsubscribe = window.firebaseOnValue(this.gameRef, (snapshot) => {
                    const data = snapshot.val();
                    if (!data) return;
                    
                    this.syncGameState(data);
                });
            }

            syncGameState(data) {
                // Update board
                this.board = data.board || Array(9).fill('');
                this.currentPlayer = data.currentPlayer;
                this.gameActive = data.gameActive;
                
                // Update UI
                this.cells.forEach((cell, index) => {
                    cell.textContent = this.board[index];
                    cell.className = 'cell';
                    if (this.board[index]) {
                        cell.classList.add('taken', this.board[index].toLowerCase());
                    }
                });

                // Update player info
                const isHost = this.isHost;
                const hostName = data.host?.name || 'Host';
                const guestName = data.guest?.name || 'Warte...';
                
                document.getElementById('player-you').textContent = `Du: ${this.playerName} (${this.playerSymbol})`;
                document.getElementById('player-opponent').textContent = 
                    `Gegner: ${isHost ? guestName : hostName} (${isHost ? 'O' : 'X'})`;
                document.getElementById('players-info').classList.add('visible');

                // Update connection status
                if (data.status === 'waiting') {
                    this.updateConnectionStatus('waiting', 'Warte auf Gegner...');
                } else if (data.host?.connected && data.guest?.connected) {
                    this.updateConnectionStatus('connected', 'Verbunden!');
                    this.updateStatus();
                } else {
                    this.updateConnectionStatus('disconnected', 'Gegner getrennt');
                }

                // Check winner
                if (!this.gameActive) {
                    const winner = this.checkWinnerFromBoard();
                    if (winner) {
                        this.highlightWinningCells(this.getWinningCombination());
                    }
                }
            }

            updateConnectionStatus(type, message) {
                const statusEl = document.getElementById('connection-status');
                statusEl.textContent = message;
                statusEl.className = `connection-status visible ${type}`;
            }

            checkWinnerFromBoard() {
                for (const combination of this.winningCombinations) {
                    const [a, b, c] = combination;
                    if (this.board[a] && 
                        this.board[a] === this.board[b] && 
                        this.board[a] === this.board[c]) {
                        return this.board[a];
                    }
                }
                return null;
            }

            getWinningCombination() {
                for (const combination of this.winningCombinations) {
                    const [a, b, c] = combination;
                    if (this.board[a] && 
                        this.board[a] === this.board[b] && 
                        this.board[a] === this.board[c]) {
                        return combination;
                    }
                }
                return null;
            }
            
            setGameMode(mode) {
                // Cleanup online mode if switching away
                if (this.isOnlineMode && mode !== 'online') {
                    this.cleanupOnlineMode();
                }

                this.gameMode = mode;
                this.isOnlineMode = (mode === 'online');
                
                document.querySelectorAll('.mode-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.mode === mode);
                });

                const onlineMenu = document.getElementById('online-menu');
                const gameCodeDisplay = document.getElementById('game-code-display');
                const playersInfo = document.getElementById('players-info');
                const connectionStatus = document.getElementById('connection-status');
                
                if (mode === 'online') {
                    onlineMenu.classList.add('visible');
                    this.subtitleElement.textContent = '🌐 Online Multiplayer';
                    this.scoreBoard.style.display = 'none';
                } else {
                    onlineMenu.classList.remove('visible');
                    gameCodeDisplay.classList.remove('visible');
                    playersInfo.classList.remove('visible');
                    connectionStatus.classList.remove('visible');
                    this.scoreBoard.style.display = 'grid';
                    
                    if (mode === 'pvp') {
                        this.subtitleElement.textContent = 'Zwei Spieler - Ein Sieger';
                        this.scoreOLabel.textContent = 'Spieler O';
                    } else if (mode === 'ai-easy') {
                        this.subtitleElement.textContent = '🍼 KI-Level: 5-Jähriger (Münzwurf wer startet!)';
                    } else if (mode === 'ai-hard') {
                        this.subtitleElement.textContent = '💀 KI-Level: Brutal (Münzwurf wer startet!)';
                    }
                }
                
                this.restartGame();
            }

            cleanupOnlineMode() {
                if (this.unsubscribe) {
                    this.unsubscribe();
                    this.unsubscribe = null;
                }
                if (this.gameRef && this.isHost) {
                    window.firebaseRemove(this.gameRef);
                }
                this.gameId = null;
                this.playerSymbol = null;
            }
            
            async handleCellClick(e) {
                const index = parseInt(e.target.dataset.index);
                
                if (this.board[index] !== '' || !this.gameActive) {
                    return;
                }

                // Online mode: only allow if it's your turn
                if (this.isOnlineMode && this.currentPlayer !== this.playerSymbol) {
                    return;
                }
                
                this.makeMove(index, this.currentPlayer);
                
                // Update Firebase in online mode
                if (this.isOnlineMode) {
                    const nextPlayer = this.currentPlayer === 'X' ? 'O' : 'X';
                    let updates = {
                        board: this.board,
                        currentPlayer: nextPlayer
                    };
                    
                    if (this.checkWin()) {
                        updates.gameActive = false;
                    } else if (this.checkDraw()) {
                        updates.gameActive = false;
                    }
                    
                    await window.firebaseUpdate(this.gameRef, updates);
                    return;
                }
                
                if (this.checkWin()) {
                    this.endGame(false);
                } else if (this.checkDraw()) {
                    this.endGame(true);
                } else {
                    this.switchPlayer();
                    
                    if (this.gameMode !== 'pvp' && this.currentPlayer === this.aiPlayer) {
                        this.makeAIMove();
                    }
                }
            }
            
            makeMove(index, player) {
                this.board[index] = player;
                const cell = this.cells[index];
                cell.textContent = player;
                cell.classList.add('taken', player.toLowerCase());
            }
            
            async makeAIMove() {
                this.gameActive = false;
                this.statusElement.textContent = '🤖 KI denkt...';
                this.statusElement.className = 'status ai-thinking';
                
                await new Promise(resolve => setTimeout(resolve, 600));
                
                let move;
                if (this.gameMode === 'ai-easy') {
                    move = this.getEasyAIMove();
                } else {
                    move = this.getHardAIMove();
                }
                
                this.makeMove(move, this.aiPlayer);
                this.gameActive = true;
                
                if (this.checkWin()) {
                    this.endGame(false);
                } else if (this.checkDraw()) {
                    this.endGame(true);
                } else {
                    this.switchPlayer();
                }
            }
            
            getEasyAIMove() {
                const availableMoves = this.getAvailableMoves();
                
                if (Math.random() < 0.3) {
                    return availableMoves[Math.floor(Math.random() * availableMoves.length)];
                }
                
                const shouldMissOpportunity = Math.random() < 0.4;
                
                if (!shouldMissOpportunity) {
                    const winningMove = this.findWinningMove(this.aiPlayer);
                    if (winningMove !== null) return winningMove;
                    
                    const blockingMove = this.findWinningMove(this.humanPlayer);
                    if (blockingMove !== null) return blockingMove;
                }
                
                if (availableMoves.includes(4) && Math.random() < 0.5) {
                    return 4;
                }
                
                return availableMoves[Math.floor(Math.random() * availableMoves.length)];
            }
            
            getHardAIMove() {
                if (this.board[4] === '') return 4;
                
                let bestScore = -Infinity;
                let bestMove = null;
                
                for (const move of this.getAvailableMoves()) {
                    this.board[move] = this.aiPlayer;
                    const score = this.minimax(this.board, 0, false);
                    this.board[move] = '';
                    
                    if (score > bestScore) {
                        bestScore = score;
                        bestMove = move;
                    }
                }
                
                return bestMove;
            }
            
            minimax(board, depth, isMaximizing) {
                if (this.checkWinningPlayer(this.aiPlayer)) return 10 - depth;
                if (this.checkWinningPlayer(this.humanPlayer)) return depth - 10;
                if (this.getAvailableMoves().length === 0) return 0;
                
                if (isMaximizing) {
                    let bestScore = -Infinity;
                    for (const move of this.getAvailableMoves()) {
                        board[move] = this.aiPlayer;
                        const score = this.minimax(board, depth + 1, false);
                        board[move] = '';
                        bestScore = Math.max(score, bestScore);
                    }
                    return bestScore;
                } else {
                    let bestScore = Infinity;
                    for (const move of this.getAvailableMoves()) {
                        board[move] = this.humanPlayer;
                        const score = this.minimax(board, depth + 1, true);
                        board[move] = '';
                        bestScore = Math.min(score, bestScore);
                    }
                    return bestScore;
                }
            }
            
            getAvailableMoves() {
                return this.board
                    .map((cell, index) => cell === '' ? index : null)
                    .filter(index => index !== null);
            }
            
            findWinningMove(player) {
                for (const move of this.getAvailableMoves()) {
                    this.board[move] = player;
                    const wins = this.checkWinningPlayer(player);
                    this.board[move] = '';
                    if (wins) return move;
                }
                return null;
            }
            
            checkWinningPlayer(player) {
                for (const combination of this.winningCombinations) {
                    const [a, b, c] = combination;
                    if (this.board[a] === player && 
                        this.board[b] === player && 
                        this.board[c] === player) {
                        return true;
                    }
                }
                return false;
            }
            
            switchPlayer() {
                this.currentPlayer = this.currentPlayer === 'X' ? 'O' : 'X';
                this.updateStatus();
            }
            
            updateStatus() {
                if (this.isOnlineMode) {
                    if (this.currentPlayer === this.playerSymbol) {
                        this.statusElement.textContent = `Du bist dran (${this.playerSymbol})`;
                        this.statusElement.className = 'status player-' + this.playerSymbol.toLowerCase();
                    } else {
                        this.statusElement.textContent = `Gegner ist dran...`;
                        this.statusElement.className = 'status ai-thinking';
                    }
                } else if (this.gameMode !== 'pvp' && this.currentPlayer === this.aiPlayer) {
                    this.statusElement.textContent = `🤖 KI (${this.aiPlayer}) ist dran`;
                    this.statusElement.className = 'status ai-thinking';
                } else if (this.gameMode !== 'pvp') {
                    this.statusElement.textContent = `Du (${this.humanPlayer}) bist dran`;
                    this.statusElement.className = 'status player-' + this.currentPlayer.toLowerCase();
                } else {
                    this.statusElement.textContent = `Spieler ${this.currentPlayer} ist dran`;
                    this.statusElement.className = 'status player-' + this.currentPlayer.toLowerCase();
                }
            }
            
            checkWin() {
                for (const combination of this.winningCombinations) {
                    const [a, b, c] = combination;
                    if (this.board[a] && 
                        this.board[a] === this.board[b] && 
                        this.board[a] === this.board[c]) {
                        this.highlightWinningCells(combination);
                        return true;
                    }
                }
                return false;
            }
            
            highlightWinningCells(combination) {
                combination.forEach(index => {
                    this.cells[index].classList.add('winning');
                });
            }
            
            checkDraw() {
                return this.board.every(cell => cell !== '');
            }
            
            endGame(isDraw) {
                this.gameActive = false;
                
                if (isDraw) {
                    this.statusElement.textContent = '🤝 Unentschieden!';
                    this.statusElement.className = 'status draw';
                    this.scores.draw++;
                    document.getElementById('score-draw').textContent = this.scores.draw;
                } else {
                    const winnerName = this.currentPlayer === this.aiPlayer && this.gameMode !== 'pvp' 
                        ? `🤖 KI (${this.aiPlayer})` 
                        : (this.gameMode !== 'pvp' ? `Du (${this.humanPlayer})` : `Spieler ${this.currentPlayer}`);
                    this.statusElement.textContent = `🎉 ${winnerName} gewinnt!`;
                    this.statusElement.className = 'status winner';
                    this.scores[this.currentPlayer]++;
                    document.getElementById(`score-${this.currentPlayer.toLowerCase()}`).textContent = 
                        this.scores[this.currentPlayer];
                }
            }
            
            restartGame() {
                this.board = Array(9).fill('');
                this.gameActive = true;
                
                if (this.isOnlineMode) {
                    // Reset online game
                    if (this.gameRef && this.isHost) {
                        window.firebaseUpdate(this.gameRef, {
                            board: Array(9).fill(''),
                            currentPlayer: 'X',
                            gameActive: true
                        });
                    }
                    return;
                }
                
                if (this.gameMode !== 'pvp') {
                    const coinFlip = Math.random() < 0.5;
                    this.humanPlayer = coinFlip ? 'X' : 'O';
                    this.aiPlayer = coinFlip ? 'O' : 'X';
                    this.currentPlayer = 'X';
                    
                    const humanLabel = this.humanPlayer === 'X' ? 'Spieler X (Du)' : 'Spieler X (KI)';
                    const aiLabel = this.aiPlayer === 'O' ? '🤖 KI (O)' : '🤖 KI (X)';
                    document.querySelector('.score-label').textContent = humanLabel;
                    this.scoreOLabel.textContent = aiLabel;
                } else {
                    this.humanPlayer = 'X';
                    this.aiPlayer = 'O';
                    this.currentPlayer = 'X';
                    document.querySelector('.score-label').textContent = 'Spieler X';
                    this.scoreOLabel.textContent = 'Spieler O';
                }
                
                this.cells.forEach(cell => {
                    cell.textContent = '';
                    cell.className = 'cell';
                });
                
                this.updateStatus();
                
                if (this.gameMode !== 'pvp' && this.aiPlayer === 'X') {
                    this.makeAIMove();
                }
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            new TikTakToe();
        });
    </script>
</body>
